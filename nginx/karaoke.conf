# =============================================
# UPSTREAM DEFINITIONS
# =============================================
upstream karaoke_backend_upstream {
    server karaoke_backend:5000;
}

upstream karaoke_frontend_upstream {
    server karaoke_frontend:80;
}

upstream karaoke_minio_console {
    server karaoke_minio:9001;
}

upstream karaoke_minio_api {
    server karaoke_minio:9000;
}

# =============================================
# MAIN SERVER (Port 8443)
# =============================================
server {
    listen 8443 ssl;
    server_name nasbpfsby.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nasbpfsby.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbpfsby.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;

    resolver 127.0.0.11 valid=30s;

    # Frontend PWA
    location / {
        set $upstream_frontend http://karaoke_frontend_upstream;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Service-Worker-Allowed "/";
    }

    # API Backend
    location /api/ {
        set $upstream_backend http://karaoke_backend_upstream;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }

    # Socket.IO WebSocket
    location /socket.io/ {
        set $upstream_backend http://karaoke_backend_upstream;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # Media Streaming
    location /media/ {
        set $upstream_backend http://karaoke_backend_upstream;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_buffering off;
        add_header Cache-Control "public, max-age=31536000";
        add_header Accept-Ranges bytes;
    }

    # API Docs
    location /docs {
        set $upstream_backend http://karaoke_backend_upstream;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $upstream_backend http://karaoke_backend_upstream;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
    }
}

# =============================================
# MINIO CONSOLE (Port 9001) - Admin Access
# =============================================
server {
    listen 9001 ssl;
    server_name nasbpfsby.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nasbpfsby.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbpfsby.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # Basic Auth untuk MinIO Console
    auth_basic "MinIO Admin Console";
    auth_basic_user_file /etc/nginx/.htpasswd_minio;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_minio http://karaoke_minio_console;
        proxy_pass $upstream_minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support untuk MinIO Console
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        client_max_body_size 1000M;
    }
}

# =============================================
# MINIO API (Port 9000) - Direct S3 Access
# =============================================
server {
    listen 9000 ssl;
    server_name nasbpfsby.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nasbpfsby.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbpfsby.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    client_max_body_size 1000M;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_minio_api http://karaoke_minio_api;
        proxy_pass $upstream_minio_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
