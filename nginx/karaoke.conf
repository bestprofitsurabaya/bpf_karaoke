# =============================================
# UPSTREAM DEFINITIONS
# =============================================
upstream karaoke_backend {
    server karaoke_backend:5000;
}

upstream karaoke_frontend {
    server karaoke_frontend:80;
}

# =============================================
# MAIN SERVER (Port 8443) - Karaoke App
# =============================================
server {
    listen 8443 ssl;
    server_name nasbpfsby.duckdns.org;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/nasbpfsby.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbpfsby.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limits
    client_max_body_size 500M;
    client_body_timeout 300s;

    # Docker DNS Resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # =========================================
    # FRONTEND (Vue.js PWA - Static Files)
    # =========================================
    location / {
        proxy_pass http://karaoke_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # PWA Headers
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache" always;
        
        # SPA Routing - fallback ke index.html
        proxy_intercept_errors on;
        error_page 404 =200 /index.html;
    }

    # =========================================
    # API BACKEND (FastAPI)
    # =========================================
    location /api/ {
        proxy_pass http://karaoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS Headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }
        
        # Timeout untuk operasi lama (scan, transcode)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # =========================================
    # WEBSOCKET (Socket.IO)
    # =========================================
    location /socket.io/ {
        proxy_pass http://karaoke_backend;
        
        # WebSocket Upgrade Headers (WAJIB!)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long-lived connection
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Disable buffering untuk real-time
        proxy_buffering off;
        proxy_cache off;
    }

    # =========================================
    # MEDIA STREAMING
    # =========================================
    location /media/ {
        proxy_pass http://karaoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Streaming support
        proxy_buffering off;
        add_header Cache-Control "public, max-age=31536000";
        add_header Accept-Ranges bytes;
    }

    # =========================================
    # API DOCS (Swagger/ReDoc)
    # =========================================
    location /docs {
        proxy_pass http://karaoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://karaoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://karaoke_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
