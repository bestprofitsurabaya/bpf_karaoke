# HTTP Server listening on 8443 inside nextcloud_nginx
server {
    listen 8443 ssl;
    server_name nasbpfsby.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nasbpfsby.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbpfsby.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;
    resolver 127.0.0.11 valid=30s;

    # Frontend Vue PWA Target Container
    location / {
        set $upstream_frontend http://karaoke_frontend:80;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend Target Container
    location /api/ {
        set $upstream_backend http://karaoke_backend:5000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket
    location /socket.io/ {
        set $upstream_backend http://karaoke_backend:5000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Media Streaming
    location /media/ {
        set $upstream_backend http://karaoke_backend:5000;
        proxy_pass $upstream_backend;
        proxy_buffering off;
        add_header Accept-Ranges bytes;
    }

    # API Docs
    location /docs {
        set $upstream_backend http://karaoke_backend:5000;
        proxy_pass $upstream_backend;
    }
    location /openapi.json {
        set $upstream_backend http://karaoke_backend:5000;
        proxy_pass $upstream_backend;
    }
}
