services:
  karaoke_db:
    image: postgres:16-alpine
    container_name: karaoke_db
    environment:
      POSTGRES_USER: ${DB_USER:-karaoke_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}
      POSTGRES_DB: ${DB_NAME:-karaoke_db}
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-karaoke_admin} -d ${DB_NAME:-karaoke_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  karaoke_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karaoke_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-karaoke_admin}:${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}@karaoke_db:5432/${DB_NAME:-karaoke_db}
      JWT_SECRET: ${JWT_SECRET:-K4r40k3JWTS3cr3tK3yV3ryL0ngStr1ng2024!@#$}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminK4r40k3!2024}
      MEDIA_PATH: /media/lagu
      CORS_ORIGINS: "*"
    volumes:
      - ./media/lagu:/media/lagu:ro
      - ./backend/uploads:/app/uploads
    depends_on:
      karaoke_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nextcloud_net

  karaoke_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karaoke_frontend
    environment:
      VITE_API_URL: https://nasbpfsby.duckdns.org:8443
      VITE_WS_URL: wss://nasbpfsby.duckdns.org:8443
    depends_on:
      - karaoke_backend
    restart: unless-stopped
    networks:
      - nextcloud_net

networks:
  nextcloud_net:
    external: true
    name: nextcloud_net
