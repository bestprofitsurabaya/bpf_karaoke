services:
  # =============================================
  # DATABASE - PostgreSQL 16
  # =============================================
  karaoke_db:
    image: postgres:16-alpine
    container_name: karaoke_db
    environment:
      POSTGRES_USER: ${DB_USER:-karaoke_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}
      POSTGRES_DB: ${DB_NAME:-karaoke_db}
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-karaoke_admin} -d ${DB_NAME:-karaoke_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # REDIS - Message Broker & Cache
  # =============================================
  karaoke_redis:
    image: redis:7-alpine
    container_name: karaoke_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # MINIO - Object Storage (S3 Compatible)
  # =============================================
  karaoke_minio:
    image: minio/minio:latest
    container_name: karaoke_minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}" --address ":${MINIO_API_PORT:-9000}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-karaoke_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-MinI0K4r40k3S3cur3!2024}
    volumes:
      - ./minio/data:/data
    restart: unless-stopped
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # MINIO CLIENT - Auto-setup bucket
  # =============================================
  karaoke_minio_setup:
    image: minio/mc:latest
    container_name: karaoke_minio_setup
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://karaoke_minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-karaoke-media};
      mc anonymous set download local/${MINIO_BUCKET:-karaoke-media};
      mc policy set download local/${MINIO_BUCKET:-karaoke-media};
      echo 'MinIO bucket setup completed';
      exit 0;
      "
    depends_on:
      karaoke_minio:
        condition: service_healthy
    networks:
      - nextcloud_net

  # =============================================
  # BACKEND API - FastAPI + Socket.IO
  # =============================================
  karaoke_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karaoke_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-karaoke_admin}:${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}@karaoke_db:5432/${DB_NAME:-karaoke_db}
      JWT_SECRET: ${JWT_SECRET:-K4r40k3JWTS3cr3tK3yV3ryL0ngStr1ng2024!@#$}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminK4r40k3!2024}
      MEDIA_PATH: /media/lagu
      CORS_ORIGINS: "*"
      REDIS_URL: ${REDIS_URL:-redis://karaoke_redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://karaoke_redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://karaoke_redis:6379/2}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-karaoke_minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-karaoke_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-MinI0K4r40k3S3cur3!2024}
      MINIO_BUCKET: ${MINIO_BUCKET:-karaoke-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://nasbpfsby.duckdns.org:9000}
    volumes:
      - ./media/lagu:/media/lagu:rw
      - ./backend/uploads:/app/uploads
    depends_on:
      karaoke_db:
        condition: service_healthy
      karaoke_redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nextcloud_net

  # =============================================
  # CELERY WORKER - Background Tasks
  # =============================================
  karaoke_celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: karaoke_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-karaoke_admin}:${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}@karaoke_db:5432/${DB_NAME:-karaoke_db}
      REDIS_URL: ${REDIS_URL:-redis://karaoke_redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://karaoke_redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://karaoke_redis:6379/2}
      MEDIA_PATH: /media/lagu
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-karaoke_minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-karaoke_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-MinI0K4r40k3S3cur3!2024}
      MINIO_BUCKET: ${MINIO_BUCKET:-karaoke-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://nasbpfsby.duckdns.org:9000}
    volumes:
      - ./media/lagu:/media/lagu:rw
      - ./media/transcoded:/media/transcoded:rw
    depends_on:
      karaoke_db:
        condition: service_healthy
      karaoke_redis:
        condition: service_healthy
      karaoke_minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nextcloud_net

  # =============================================
  # CELERY BEAT - Periodic Tasks Scheduler
  # =============================================
  karaoke_celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: karaoke_celery_beat
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-karaoke_admin}:${DB_PASSWORD:-K4r40k3S3cur3P4ss!2024}@karaoke_db:5432/${DB_NAME:-karaoke_db}
      REDIS_URL: ${REDIS_URL:-redis://karaoke_redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://karaoke_redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://karaoke_redis:6379/2}
      MEDIA_PATH: /media/lagu
    volumes:
      - ./media/lagu:/media/lagu:rw
    depends_on:
      karaoke_redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nextcloud_net

  # =============================================
  # FRONTEND - Vue 3 PWA
  # =============================================
  karaoke_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karaoke_frontend
    environment:
      VITE_API_URL: https://nasbpfsby.duckdns.org:8443
      VITE_WS_URL: wss://nasbpfsby.duckdns.org:8443
    depends_on:
      - karaoke_backend
    restart: unless-stopped
    networks:
      - nextcloud_net

networks:
  nextcloud_net:
    external: true
    name: nextcloud_net
